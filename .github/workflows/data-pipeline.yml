name: Data Pipeline - Debug (Puppeteer Official)

on:
  workflow_dispatch:
    inputs:
      init_db:
        description: 'Inicializar banco de dados antes?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  debug-extraction:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências Backend
        run: npm ci
        working-directory: backend

      # ✅ Ação Oficial para instalar Chromium e dependências corretas
      - name: Setup Puppeteer
        id: puppeteer
        uses: puppeteer/setup-chromium@v1

      - name: 🔍 Verificar Secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "❌ ERRO: DATABASE_URL não configurado nos Secrets!"
            exit 1
          fi
          echo "✅ DATABASE_URL presente"
          if [ -z "${{ secrets.CITO_API_TOKEN }}" ]; then
            echo "⚠️ CITO_API_TOKEN ausente"
          else
            echo "✅ CITO_API_TOKEN presente"
          fi
        shell: bash

      - name: 🗄️ Testar Conexão DB
        run: node .github/scripts/test-db.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend

      - name: 🏗️ Inicializar DB (Se solicitado)
        if: github.event.inputs.init_db == 'true'
        run: node .github/scripts/init-db-safe.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend

      - name: 🚀 Rodar Extração (Debug)
        run: node .github/scripts/run-extract-safe.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CITO_API_TOKEN: ${{ secrets.CITO_API_TOKEN }}
          NODE_ENV: production
          # Usa o caminho instalado pela ação oficial
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.puppeteer.outputs.chromium-path }}
        working-directory: backend

      - name: 📊 Contar Registros
        run: node .github/scripts/check-count.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend
