name: Data Pipeline - Debug (Ubuntu 24.04)

on:
  workflow_dispatch:
    inputs:
      init_db:
        description: 'Inicializar banco de dados antes?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  debug-extraction:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências Backend
        run: npm ci
        working-directory: backend

      # ✅ Instalação correta das dependências para Ubuntu 24.04
      - name: Instalar Dependências do Sistema (Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libgbm1 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxshmfence1 \
            libxtst6 \
            fonts-liberation \
            libasound2t64 \
            libatspi2.0-0 \
            libdrm2 \
            libdbus-1-3 \
            libxkbfile1 \
            libxmuu1 \
            xdg-utils \
            libvulkan1 \
            liblcms2-2 \
            libjsoncpp26 \
            libpci3 \
            libudev1 \
            libavahi-client3 \
            libkrb5support0 \
            libk5crypto3 \
            libkrb5-3 \
            libgssapi-krb5-2 \
            libldap-2.5-0 \
            libsasl2-2 \
            libsqlite3-0 \
            libicu74 \
            libxml2 \
            libffi8 \
            ca-certificates \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-tlwg-loma-otf \
            fonts-freefont-ttf

      - name: 🔍 Verificar Secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "❌ ERRO: DATABASE_URL não configurado nos Secrets!"
            exit 1
          fi
          echo "✅ DATABASE_URL presente"
          if [ -z "${{ secrets.CITO_API_TOKEN }}" ]; then
            echo "⚠️ CITO_API_TOKEN ausente"
          else
            echo "✅ CITO_API_TOKEN presente"
          fi
        shell: bash

      - name: 🗄️ Testar Conexão DB
        run: node .github/scripts/test-db.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend

      - name: 🏗️ Inicializar DB (Se solicitado)
        if: github.event.inputs.init_db == 'true'
        run: node .github/scripts/init-db-safe.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend

      - name: 🚀 Rodar Extração (Debug)
        run: node .github/scripts/run-extract-safe.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CITO_API_TOKEN: ${{ secrets.CITO_API_TOKEN }}
          NODE_ENV: production
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
        working-directory: backend

      - name: 📊 Contar Registros
        run: node .github/scripts/check-count.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend
