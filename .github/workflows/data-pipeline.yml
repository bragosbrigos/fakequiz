name: Data Pipeline - Extração e Sincronização

on:
  schedule:
    # Executar extração de dados a cada hora
    - cron: '0 * * * *'
    # Executar sincronização de partidas a cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Permitir execução manual para testes e inicialização do banco
    inputs:
      init_db:
        description: 'Inicializar banco de dados antes de executar'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  init-database:
    runs-on: ubuntu-latest
    if: github.event.inputs.init_db == 'true'

    steps:
      - name: Initialize Database Schema
        run: |
          echo "Inicializando schema do banco de dados..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.API_BASE_URL }}/api/init-db" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Resposta da API:"
          echo "$BODY"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Banco de dados inicializado com sucesso!"
            exit 0
          else
            echo "❌ Erro na inicialização (HTTP $HTTP_CODE)"
            exit 1
          fi

  extract-data:
    runs-on: ubuntu-latest
    needs: [init-database]
    if: always() && (needs.init-database.result == 'success' || needs.init-database.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências Backend
        run: npm ci
        working-directory: backend

      - name: Instalar dependências do sistema (Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libgbm1 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxshmfence1 \
            libxtst6 \
            fonts-liberation \
            libasound2t64 \
            libdrm2 \
            libdbus-1-3 \
            libx11-xcb1 \
            libxcb1 \
            libxrender1 \
            libxi6 \
            libxcursor1 \
            libxfixes3 \
            libxext6 \
            libx11-6 \
            libfontconfig1 \
            libfreetype6 \
            libglib2.0-0 \
            ca-certificates \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-tlwg-loma-otf \
            fonts-freefont-ttf

      - name: Rodar Extração Direta (Debug)
        run: |
          cd backend
          echo "🚀 Iniciando extração direta..."
          node --unhandled-rejections=strict -e "
            process.env.PUPPETEER_EXECUTABLE_PATH = '/usr/bin/chromium-browser';
            const { runExtraction } = require('./src/services/dataPipeline');

            runExtraction()
              .then(result => {
                console.log('✅ EXTRAÇÃO CONCLUÍDA!');
                console.log(JSON.stringify(result, null, 2));
                process.exit(0);
              })
              .catch(err => {
                console.error('❌ ERRO NA EXTRAÇÃO:');
                console.error('Mensagem:', err.message);
                console.error('Stack:', err.stack);
                process.exit(1);
              });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CITO_API_TOKEN: ${{ secrets.CITO_API_TOKEN }}
          NODE_ENV: production

      - name: Trigger Data Extraction (Fallback)
        if: failure()
        run: |
          echo "Tentando via API remota..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.API_BASE_URL }}/api/extract" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Resposta da API:"
          echo "$BODY"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Pipeline de extração concluída com sucesso!"
            exit 0
          else
            echo "❌ Erro na extração (HTTP $HTTP_CODE)"
            exit 1
          fi

  sync-matches:
    runs-on: ubuntu-latest
    needs: [extract-data]
    if: always() && (needs.extract-data.result == 'success' || needs.extract-data.result == 'skipped')

    steps:
      - name: Sync Match Schedule
        run: |
          echo "Sincronizando agenda de partidas..."

          # Fazer requisição POST para o endpoint de sincronização
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.API_BASE_URL }}/api/schedule/sync" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Resposta da API:"
          echo "$BODY"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Sincronização de partidas concluída com sucesso!"
            exit 0
          else
            echo "❌ Erro na sincronização (HTTP $HTTP_CODE)"
            exit 1
          fi
