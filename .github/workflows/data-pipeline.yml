name: Data Pipeline - Extração e Sincronização

on:
  schedule:
    # Executar extração de dados a cada hora
    - cron: '0 * * * *'
    # Executar sincronização de partidas a cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Permitir execução manual para testes

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
    
      - name: Instalar dependências do backend
        run: |
          cd backend
          npm ci

      - name: Instalar dependências do sistema para Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libgbm1 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxshmfence1 \
            libxtst6 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            fonts-liberation \
            libasound2 \
            libatspi2.0-0 \
            libdrm2 \
            libxkbcommon-x11-0 \
            libglx-mesa0 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libexpat1 \
            libxcb1 \
            libx11-xcb1 \
            libxrender1 \
            libxi6 \
            libxcursor1 \
            libxfixes3 \
            libxext6 \
            libx11-6 \
            libfontconfig1 \
            libfreetype6 \
            libpixman-1-0 \
            libcairo2 \
            libpango-1.0-0 \
            libharfbuzz0b \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxkbcommon0 \
            libxshmfence1 \
            libasound2t64 \
            libatspi2.0-0t64 \
            libdbus-1-3 \
            libnspr4 \
            libnss3 \
            libcups2t64 \
            libdrm2 \
            libxkbfile1 \
            libxmuu1 \
            xdg-utils \
            libvulkan1 \
            liblcms2-2 \
            libjsoncpp26 \
            libpci3 \
            libudev1 \
            libavahi-client3 \
            libkrb5support0 \
            libk5crypto3 \
            libkrb5-3 \
            libgssapi-krb5-2 \
            libldap-2.5-0 \
            libsasl2-2 \
            libsqlite3-0 \
            libicu74 \
            libxml2 \
            libffi8 \
            libhogweed6t64 \
            libnettle8t64 \
            libgnutls30t64 \
            libunistring5 \
            libidn2-0 \
            libp11-kit0 \
            libtasn1-6 \
            libcap-ng0 \
            libaudit1 \
            libbz2-1.0 \
            liblzma5 \
            libzstd1 \
            libblkid1 \
            libmount1 \
            libselinux1 \
            libseccomp2 \
            libapparmor1 \
            libproc2-0 \
            libsystemd0 \
            libgpg-error0 \
            libgcrypt20 \
            liblz4-1 \
            librtmp1 \
            libssh-4 \
            libpsl5t64 \
            libmpfr6 \
            libreadline8t64 \
            libncursesw6 \
            libtinfo6 \
            libuuid1 \
            libcom-err2 \
            libss2 \
            liblogrotate0 \
            libpopt0 \
            libjson-c5 \
            libfdisk1 \
            libsmartcols1 \
            libcap2 \
            libattr1 \
            libacl1 \
            libmd0 \
            libbsd0 \
            libxdmcp6 \
            libedit2 \
            libcbor0.10 \
            libfido2-1 \
            libxau6 \
            libgomp1 \
            libgcc-s1 \
            libc6 \
            ca-certificates \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-tlwg-loma-otf \
            fonts-freefont-ttf
            
      - name: Trigger Data Extraction
        run: |
          echo "Iniciando pipeline de extração de dados..."
          
          # Fazer requisição POST para o endpoint de extração
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.API_BASE_URL }}/api/extract" \
            -H "Content-Type: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Resposta da API:"
          echo "$BODY"
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Pipeline de extração concluída com sucesso!"
            exit 0
          else
            echo "❌ Erro na extração (HTTP $HTTP_CODE)"
            exit 1
          fi

  sync-matches:
    runs-on: ubuntu-latest
    
    steps:
      - name: Sync Match Schedule
        run: |
          echo "Sincronizando agenda de partidas..."
          
          # Fazer requisição POST para o endpoint de sincronização
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.API_BASE_URL }}/api/schedule/sync" \
            -H "Content-Type: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Resposta da API:"
          echo "$BODY"
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Sincronização de partidas concluída com sucesso!"
            exit 0
          else
            echo "❌ Erro na sincronização (HTTP $HTTP_CODE)"
            exit 1
          fi
